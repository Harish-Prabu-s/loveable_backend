# ─────────────────────────────────────────────────────────────────────────────
# Coturn Production Configuration
# Save to: /etc/coturn/turnserver.conf (or mount via Docker)
# ─────────────────────────────────────────────────────────────────────────────

# ── Network ───────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# CRITICAL: Replace with your actual server public IP
external-ip=72.62.195.63/72.62.195.63

# ── Authentication ────────────────────────────────────────────────────────────
# Time-limited HMAC credentials (most secure — no static passwords)
# Must match TURN_STATIC_SECRET in backend .env
use-auth-secret
static-auth-secret=6ee1b1c678a1bc1b693e87178a3c8e474581f44d88e7a689e472648795777490

# ── TLS (HTTPS) ───────────────────────────────────────────────────────────────
# Generate with: certbot certonly --standalone -d turn.yourdomain.com
cert=/etc/letsencrypt/live/turn.yourdomain.com/fullchain.pem
pkey=/etc/letsencrypt/live/turn.yourdomain.com/privkey.pem
# Prefer TLS ciphers
cipher-list=ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256

# ── Realm ─────────────────────────────────────────────────────────────────────
realm=loveable.sbs
server-name=loveable.sbs

# ── Security: Block TURN relay to private ranges (prevent SSRF attacks) ──────
# RFC1918 ranges — never allow TURN to relay to internal network
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=::1

# ── RTP Port range ────────────────────────────────────────────────────────────
# Open these on your firewall: UDP 49152-65535
min-port=49152
max-port=65535

# ── Performance ───────────────────────────────────────────────────────────────
# Max simultaneous TURN allocations (tune based on bandwidth)
total-quota=200
# Stale nonce expiry (seconds)
stale-nonce=600
# Credential TTL must match what your backend generates (24h = 86400s)
max-allocate-lifetime=86400

# ── WebRTC requirements ───────────────────────────────────────────────────────
fingerprint
no-multicast-peers

# ── Logging ───────────────────────────────────────────────────────────────────
log-file=/var/log/coturn/turnserver.log
new-log-timestamp
syslog
# Useful for debugging ICE:
# verbose
# log-binding=1
